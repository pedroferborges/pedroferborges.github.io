<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 150" width="100%" height="100%">
  <defs>
    <!-- Estilo de Fontes e Efeitos -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Cinzel:wght@600;700&amp;display=swap');
      
      .frame {
        fill: none;
        stroke: #38bdf8;
        stroke-width: 2;
        opacity: 0.8;
      }
      .monogram {
        font-family: 'Great Vibes', cursive;
        font-size: 110px;
        fill: #38bdf8;
      }
      .name-text {
        font-family: 'Cinzel', serif;
        font-size: 34px;
        font-weight: 700;
        fill: #f8fafc;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <!-- Moldura Retangular -->
  <rect x="70" y="30" width="350" height="90" class="frame" />

  <!-- Monograma PB (À Esquerda, Sobreposto) -->
  <text x="25" y="108" class="monogram">PB</text>

  <!-- Nome Completo (Empilhado à Direita) -->
  <text x="175" y="72" class="name-text">PEDRO</text>
  <text x="175" y="106" class="name-text">BORGES</text>
</svg>
